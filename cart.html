<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ไทยปนลาว สาวแว่น | ตะกร้าสินค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background-color: #f5f5f5; padding-top: calc(60px + var(--sat)); padding-bottom: calc(40px + var(--sab)); font-family: 'Kanit', sans-serif; }
        header { height: calc(60px + var(--sat)); padding-top: var(--sat); }
    </style>
</head>
<body>
    <header class="fixed top-0 left-0 w-full bg-white z-50 border-b flex items-center px-4 shadow-sm">
        <button onclick="location.href='index.html'" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full active:scale-90 transition">
            <i class="fas fa-chevron-left text-lg"></i>
        </button>
        <h1 class="ml-4 font-bold text-gray-800 text-lg">ไทยปนลาว สาวแว่น</h1>
    </header>

    <main class="container mx-auto max-w-lg p-4">
        <div id="cart-list" class="space-y-3 mb-6">
            <div class="flex justify-center py-20"><i class="fas fa-spinner fa-spin text-[#ee4d2d] text-2xl"></i></div>
        </div>

        <div id="checkout-section" class="bg-white rounded-3xl p-6 shadow-md space-y-5 hidden">
            <div class="flex justify-between items-end border-b pb-4">
                <span class="text-gray-500 font-medium">ยอดรวมรวมค่าส่ง</span>
                <span id="cart-total" class="text-3xl font-bold text-[#ee4d2d]">฿0</span>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="customer-name" placeholder="ชื่อผู้รับ" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:border-[#ee4d2d] transition-all">
                <input type="tel" id="customer-phone" placeholder="เบอร์โทรศัพท์" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:border-[#ee4d2d] transition-all">
                <textarea id="customer-address" rows="2" placeholder="ที่อยู่จัดส่ง" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:border-[#ee4d2d] transition-all resize-none"></textarea>
            </div>

            <div class="flex flex-col gap-3 pt-2">
                <button onclick="checkoutWithBeam()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-3 shadow-lg active:scale-95 transition">
                    <i class="fas fa-credit-card text-xl"></i> ชำระเงินออนไลน์ (QR Payment)
                </button>
                <button onclick="checkoutViaLine()" class="w-full bg-[#06C755]/10 text-[#06C755] font-semibold py-3 rounded-xl flex justify-center items-center gap-2 border border-[#06C755]/20 active:scale-95 transition">
                    <i class="fab fa-line text-2xl"></i> สั่งซื้อผ่าน LINE
                </button>
            </div>
        </div>
    </main>

    <div id="qr-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeQR()"></div>
        <div class="bg-white rounded-3xl max-w-xs w-full relative z-[110] text-center shadow-2xl overflow-hidden">
            <div class="p-6 pb-2">
                <h3 class="text-xl font-bold text-gray-800 mb-1">สแกนชำระเงิน</h3>
                <p class="text-[10px] text-blue-600 font-bold italic uppercase tracking-widest italic">🇱🇦 Support LaoQR / BCEL One</p>
            </div>
            
            <div class="px-6 mb-4">
                <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                    <div class="bg-[#003459] w-full py-4 flex justify-center items-center">
                        <img src="https://raw.githubusercontent.com/thaipoanlao/shop/refs/heads/main/photo/promptpay-logo.png" 
                             alt="PromptPay" 
                             class="h-10 w-auto brightness-0 invert" 
                             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/c/c5/PromptPay-logo.png'; this.className='h-10 w-auto'">
                    </div>
                    <div class="relative min-h-[240px] p-4 flex items-center justify-center bg-white">
                        <img id="qr-image" src="" alt="PromptPay QR" class="w-full h-auto rounded-lg">
                        <div id="qr-loader" class="absolute inset-0 flex items-center justify-center bg-white/95">
                            <i class="fas fa-spinner fa-spin text-blue-600 text-4xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-[11px] text-gray-500 mb-6 font-light px-6 leading-relaxed">กรุณาสแกนเพื่อชำระเงิน<br><span class="text-blue-500 font-medium">ສະແກນດ້ວຍແອັບທະນາຄານລາວໄດ້ເລີຍ</span></p>
            
            <div class="px-6 pb-6">
                <button onclick="closeQR()" class="w-full py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl active:scale-95 transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        const LINE_ID = "@888fsncq";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRa5jSPp8xIyhJfaq_rwMEWzPCUpjDnUfOnk476Ce80gfcUUdxCVVIsW3YYmFZe4hsKsB6PdCyNESBq/pub?output=csv";
        let products = [], finalAmount = 0;

        async function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            if (Object.keys(cart).length === 0) {
                document.getElementById('cart-list').innerHTML = `<div class="text-center py-20 text-gray-400"><p>ไม่มีสินค้าในตะกร้า</p></div>`;
                document.getElementById('checkout-section').classList.add('hidden');
                return;
            }
            try {
                const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
                const data = await res.text();
                const rows = data.split(/\r?\n/).slice(1);
                products = rows.filter(r => r.trim() !== "").map(r => {
                    const parts = r.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                    const clean = parts.map(p => p.replace(/^"|"$/g, '').trim());
                    return { id: clean[0], name: clean[1], price: parseFloat(clean[2]), images: clean[6].split("|") };
                });

                let html = '', subTotal = 0, tempehPieces = 0;
                for (const [id, qty] of Object.entries(cart)) {
                    const p = products.find(prod => prod.id == id);
                    if (p) {
                        let itemTotal = 0, quantity = parseInt(qty);
                        if (id === "1") {
                            if (quantity === 3) itemTotal = 100;
                            else if (quantity === 6) itemTotal = 200;
                            else itemTotal = p.price * quantity;
                            tempehPieces += quantity;
                        } else {
                            itemTotal = p.price * quantity;
                            if (id === "2") tempehPieces += (quantity * 3);
                            if (id === "3") tempehPieces += (quantity * 6);
                        }
                        subTotal += itemTotal;
                        const dName = (id === "1" || id === "2" || id === "3") ? p.name.replace(/150g\s?/, "").trim() : p.name;
                        html += `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm border border-gray-50"><img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-xl shadow-inner bg-gray-50"><div class="flex-1 min-w-0"><div class="text-sm font-bold text-gray-800 truncate">${dName}</div><div class="text-[#ee4d2d] font-bold">฿${itemTotal.toLocaleString()}</div></div><div class="flex items-center gap-3 bg-gray-50 rounded-full px-2 py-1"><button onclick="changeQty('${id}', -1)" class="w-7 h-7 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-400"><i class="fas fa-minus text-[10px]"></i></button><span class="text-sm font-bold text-gray-700 text-center min-w-[20px]">${quantity}</span><button onclick="changeQty('${id}', 1)" class="w-7 h-7 flex items-center justify-center bg-white rounded-full shadow-sm text-[#ee4d2d]"><i class="fas fa-plus text-[10px]"></i></button></div></div>`;
                    }
                }
                let shipping = (tempehPieces > 0 && tempehPieces < 6) ? 35 : 0;
                finalAmount = subTotal + shipping;
                document.getElementById('cart-list').innerHTML = html;
                document.getElementById('cart-total').innerText = '฿' + finalAmount.toLocaleString();
                document.getElementById('checkout-section').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        async function checkoutWithBeam() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            if (!name || !phone) return alert('กรุณากรอกชื่อและเบอร์โทรศัพท์ก่อนครับ');

            document.getElementById('qr-modal').classList.remove('hidden');
            const qrLoader = document.getElementById('qr-loader');
            const qrImage = document.getElementById('qr-image');
            qrImage.src = "";
            qrLoader.classList.remove('hidden');

            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            const items = [];
            for (const [id, qty] of Object.entries(cart)) {
                const p = products.find(prod => prod.id == id);
                if (p) {
                    let up = p.price;
                    if (id == "1") { if (qty == 3) up = 100/3; else if (qty == 6) up = 200/6; }
                    items.push({ 
                        name: p.name.replace(/150g\s?/, "").trim(), 
                        quantity: parseInt(qty), 
                        price: Math.round(Number(up).toFixed(2) * 100) 
                    });
                }
            }

            try {
                // ✨ แก้ไขจุดที่ทำให้เกิด Error 400: เพิ่มฟิลด์ qrPromptPay ใน paymentMethod
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: Math.round(Number(finalAmount).toFixed(2) * 100),
                        currency: "THB",
                        referenceId: "ORDER-" + Date.now(),
                        items: items,
                        paymentMethod: { 
                            paymentMethodType: "QR_PROMPT_PAY",
                            qrPromptPay: { expiryTime: new Date(Date.now() + 3600000).toISOString() } // เพิ่มจุดนี้
                        }
                    })
                });

                const result = await res.json();
                if (res.ok && result.actionRequired === "ENCODED_IMAGE") {
                    qrImage.src = "data:image/png;base64," + result.encodedImage.imageBase64Encoded;
                    qrLoader.classList.add('hidden');
                } else {
                    alert("สร้าง QR ไม่สำเร็จ: " + (result.message || "กรุณาลองใหม่"));
                    closeQR();
                }
            } catch (e) {
                alert("ระบบขัดข้อง: ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
                closeQR();
            }
        }

        function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); }
        function changeQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '{}');
            cart[id] = (parseInt(cart[id]) || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function checkoutViaLine() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;
            if (!name || !phone) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            let msg = `🛒 *สั่งซื้อ ไทยปนลาว สาวแว่น*\n----------------\n`, sub = 0, tp = 0;
            for (const [id, qty] of Object.entries(cart)) {
                const p = products.find(prod => prod.id == id);
                let itemP = 0;
                if (id == "1") {
                    if (qty == 3) itemP = 100; else if (qty == 6) itemP = 200; else itemP = p.price * qty;
                    tp += (qty * 1);
                } else {
                    itemP = p.price * qty;
                    if (id == "2") tp += (qty * 3);
                    if (id == "3") tp += (qty * 6);
                }
                const dName = (id === "1" || id === "2" || id === "3") ? p.name.replace(/150g\s?/, "").trim() : p.name;
                msg += `- ${dName} (x${qty}): ${itemP}.- \n`;
                sub += itemP;
            }
            let sf = (tp > 0 && tp < 6) ? 35 : 0;
            msg += `----------------\n📦 ค่าส่ง: ${sf} บาท\n💰 รวมสุทธิ: ${(sub + sf).toLocaleString()} บาท\n👤 ${name}\n📞 ${phone}\n📍 ${address}`;
            window.location.href = `https://line.me/R/oaMessage/${LINE_ID}/?${encodeURIComponent(msg)}`;
        }

        loadCart();
    </script>
</body>
</html>
