<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ตะกร้าสินค้า | ไทยปนลาว สาวแว่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background-color: #f5f5f5; padding-top: calc(60px + var(--sat)); padding-bottom: calc(40px + var(--sab)); font-family: 'Kanit', sans-serif; }
        header { height: calc(60px + var(--sat)); padding-top: var(--sat); }
    </style>
</head>
<body>
    <header class="fixed top-0 left-0 w-full bg-white z-50 border-b flex items-center px-4 shadow-sm">
        <button onclick="location.href='index.html'" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full active:scale-90 transition">
            <i class="fas fa-chevron-left text-lg"></i>
        </button>
        <h1 class="ml-4 font-bold text-gray-800 text-lg">ตะกร้าสินค้า</h1>
    </header>

    <main class="container mx-auto max-w-lg p-4">
        <div id="cart-list" class="space-y-3 mb-6">
            <div class="flex justify-center py-20"><i class="fas fa-spinner fa-spin text-[#ee4d2d] text-2xl"></i></div>
        </div>

        <div id="checkout-section" class="bg-white rounded-3xl p-6 shadow-md space-y-8 hidden">
            <div class="flex justify-between items-end border-b border-gray-100 pb-5">
                <span class="text-gray-500 font-medium text-sm tracking-wide">ยอดรวมสุทธิ</span>
                <span id="cart-total" class="text-4xl font-extrabold text-[#ee4d2d]">฿0</span>
            </div>
            
            <div id="qr-frame" class="bg-white/60 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-xl space-y-6 text-center">
                <h3 class="text-2xl font-bold text-gray-800 tracking-tight">สแกนชำระเงิน</h3>
                <p class="text-[11px] text-gray-500 font-light px-2 leading-relaxed">กรุณาสแกน QR Code ด้านล่างเพื่อชำระเงินผ่านแอปธนาคาร<br>สะແກນດ້ວຍແອັບທະນາຄານລາວໄດ້ເລີຍ</p>
                
                <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl inline-block shadow-inner space-y-3">
                    <div class="bg-white border border-gray-100 inline-block px-3 py-1.5 rounded-lg shadow-sm">
                        <img src="https://raw.githubusercontent.com/thaipoanlao/shop/refs/heads/main/photo/prompt-pay-logo.avif" alt="PromptPay" class="h-6">
                    </div>
                    <img id="qr-image" src="" alt="PromptPay QR" class="w-full h-auto rounded-xl">
                </div>
            </div>

            <div class="bg-blue-50/50 rounded-2xl p-5 flex items-center gap-3 border border-blue-100">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Flag_of_Laos.svg" class="w-8 shadow-sm rounded-sm">
                <div class="text-[12px] text-blue-700 leading-tight">
                    <p class="font-bold">ສະແກນຈ່າຍດ້ວຍແອັບທະນາຄານລາວໄດ້</p>
                    <p class="opacity-80">รองรับการสแกนจ่ายผ่าน BCEL One และแอปธนาคารลาวทุกแห่ง</p>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <h4 class="text-sm font-semibold text-gray-700 tracking-wide">ข้อมูลจัดส่ง</h4>
                <input type="text" id="customer-name" placeholder="ชื่อผู้รับ" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-5 py-3 outline-none focus:border-[#ee4d2d] transition-all text-sm">
                <input type="tel" id="customer-phone" placeholder="เบอร์โทรศัพท์" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-5 py-3 outline-none focus:border-[#ee4d2d] transition-all text-sm">
                <textarea id="customer-address" rows="3" placeholder="ที่อยู่สำหรับจัดส่ง" class="w-full border border-gray-100 bg-gray-50 rounded-xl px-5 py-3 outline-none focus:border-[#ee4d2d] transition-all resize-none text-sm"></textarea>
            </div>

            <div class="flex flex-col gap-4 pt-4">
                <button onclick="checkoutViaLine()" class="w-full bg-[#06C755]/10 text-[#06C755] font-semibold py-4 rounded-xl flex justify-center items-center gap-3 border border-[#06C755]/20 active:scale-95 transition">
                    <i class="fab fa-line text-2xl"></i> สั่งซื้อผ่าน LINE
                </button>
            </div>
        </div>
    </main>

    <script>
        const LINE_ID = "@888fsncq";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRa5jSPp8xIyhJfaq_rwMEWzPCUpjDnUfOnk476Ce80gfcUUdxCVVIsW3YYmFZe4hsKsB6PdCyNESBq/pub?output=csv";
        
        // ✨ แทนที่ด้วย PromptPay ID ของจริง (เช่น เบอร์โทรศัพท์) ของร้านค้าเพื่อการสแกนจ่ายได้จริง
        const PROMPTPAY_ID = "0888888888"; 
        
        let products = [], finalAmount = 0;

        async function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            if (Object.keys(cart).length === 0) {
                document.getElementById('cart-list').innerHTML = `<div class="text-center py-20 text-gray-400"><p>ไม่มีสินค้าในตะกร้า</p></div>`;
                document.getElementById('checkout-section').classList.add('hidden');
                return;
            }
            try {
                const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
                const data = await res.text();
                const rows = data.split(/\r?\n/).slice(1);
                products = rows.filter(r => r.trim() !== "").map(r => {
                    const parts = r.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                    const clean = parts.map(p => p.replace(/^"|"$/g, '').trim());
                    return { id: clean[0], name: clean[1], price: parseFloat(clean[2]), images: clean[6].split("|") };
                });

                let html = '', subTotal = 0, tempehPieces = 0;
                for (const [id, qty] of Object.entries(cart)) {
                    const p = products.find(prod => prod.id == id);
                    if (p) {
                        let itemTotal = 0, quantity = parseInt(qty);
                        if (id === "1") {
                            if (quantity === 3) itemTotal = 100;
                            else if (quantity === 6) itemTotal = 200;
                            else itemTotal = p.price * quantity;
                            tempehPieces += quantity;
                        } else {
                            itemTotal = p.price * quantity;
                            if (id === "2") tempehPieces += (quantity * 3);
                            if (id === "3") tempehPieces += (quantity * 6);
                        }
                        subTotal += itemTotal;
                        const displayName = (id === "1" || id === "2" || id === "3") ? p.name.replace(/150g\s?/, "").trim() : p.name;
                        html += `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm border border-gray-50"><img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-xl shadow-inner bg-gray-50"><div class="flex-1 min-w-0"><div class="text-sm font-bold text-gray-800 truncate">${displayName}</div><div class="text-[#ee4d2d] font-bold">฿${itemTotal.toLocaleString()}</div></div><div class="flex items-center gap-3 bg-gray-50 rounded-full px-2 py-1"><button onclick="changeQty('${id}', -1)" class="w-7 h-7 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-400"><i class="fas fa-minus text-[10px]"></i></button><span class="text-sm font-bold text-gray-700 text-center min-w-[20px]">${quantity}</span><button onclick="changeQty('${id}', 1)" class="w-7 h-7 flex items-center justify-center bg-white rounded-full shadow-sm text-[#ee4d2d]"><i class="fas fa-plus text-[10px]"></i></button></div></div>`;
                    }
                }
                let shipping = (tempehPieces > 0 && tempehPieces < 6) ? 35 : 0;
                if (tempehPieces >= 6) {
                    html += `<div class="bg-green-50 p-4 rounded-2xl flex justify-between items-center text-green-600 border border-green-100 font-bold text-xs"><span><i class="fas fa-shipping-fast"></i> โปรโมชั่นสั่งครบ 6 ชิ้น: ส่งฟรี!</span><span>฿0</span></div>`;
                } else if (shipping > 0) {
                    html += `<div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center text-blue-600 border border-blue-100 font-bold text-xs"><span><i class="fas fa-truck"></i> ค่าจัดส่ง (อีก ${6-tempehPieces} ชิ้นส่งฟรี)</span><span>฿${shipping}</span></div>`;
                }

                finalAmount = subTotal + shipping;
                document.getElementById('cart-list').innerHTML = html;
                document.getElementById('cart-total').innerText = '฿' + finalAmount.toLocaleString();
                document.getElementById('checkout-section').classList.remove('hidden');

                // ✨ สร้าง QR Code ของจริงที่สแกนชำระได้ทันทีโดยใช้ยอดเงินที่คำนวณได้
                const qrContainer = document.getElementById('qr-image');
                if (finalAmount > 0) {
                    // ใช้ตัวสร้าง QR Code ของ PromptPay.io
                    qrContainer.src = `https://promptpay.io/${PROMPTPAY_ID}/${finalAmount}.png`;
                } else {
                    qrContainer.src = ''; // เคลียร์ถ้าไม่มีสินค้า
                }
            } catch (e) { console.error(e); }
        }

        function changeQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '{}');
            cart[id] = (parseInt(cart[id]) || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function checkoutViaLine() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;
            if (!name || !phone) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            let msg = `🛒 *สั่งซื้อสินค้า*\n----------------\n`, sub = 0, tp = 0;
            for (const [id, qty] of Object.entries(cart)) {
                const p = products.find(prod => prod.id == id);
                let itemP = 0;
                if (id == "1") {
                    if (qty == 3) itemP = 100; else if (qty == 6) itemP = 200; else itemP = p.price * qty;
                    tp += (qty * 1);
                } else {
                    itemP = p.price * qty;
                    if (id == "2") tp += (qty * 3);
                    if (id == "3") tp += (qty * 6);
                }
                const dName = (id === "1" || id === "2" || id === "3") ? p.name.replace(/150g\s?/, "").trim() : p.name;
                msg += `- ${dName} (x${qty}): ${itemP}.- \n`;
                sub += itemP;
            }
            let sf = (tp > 0 && tp < 6) ? 35 : 0;
            msg += `----------------\n📦 ค่าส่ง: ${sf} บาท\n💰 รวมสุทธิ: ${(sub + sf).toLocaleString()} บาท\n👤 ${name}\n📞 ${phone}\n📍 ${address}`;
            window.location.href = `https://line.me/R/oaMessage/${LINE_ID}/?${encodeURIComponent(msg)}`;
        }

        loadCart();
    </script>
</body>
</html>
